# Puerto del servidor (cambiado a 8081 por si el 8080 está ocupado)
server.port=8081

# URL de la base de datos H2 en memoria
# "mem:hardware_db" → base de datos temporal que vive solo mientras la app está corriendo
# DB_CLOSE_DELAY=-1 → mantiene la BD abierta mientras la app esté activa
# DB_CLOSE_ON_EXIT=FALSE → no cierra la BD al desconectarse la consola H2
spring.datasource.url=jdbc:h2:mem:hardware_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

spring.datasource.driverClassName=org.h2.Driver # Driver necesario para conectarse a H2
spring.datasource.username=sa                   # Usuario por defecto de H2
spring.datasource.password=                     # Sin contraseña

# Dialecto de Hibernate: le indica cómo generar el SQL compatible con H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Habilita la consola web de H2 para visualizar la base de datos en el navegador
# Acceso en: http://localhost:8081/h2-console/
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
